<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка — GlorionPC</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="admin-page-mobile">
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="brand">
        <div class="brand__logo-wrap">
          <img
            src="/images/logo-glorionpc.png"
            alt="Логотип GlorionPC"
            class="brand__logo"
          />
        </div>

        <div class="brand__content">
          <span class="brand__mark">GlorionPC</span>
          <span class="brand__text">Admin Panel</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">На сайт</a>
      </nav>
    </div>
  </header>

  <main class="admin-page">
    <div class="container">
      <div class="section-heading">
        <p class="section-heading__eyebrow">GlorionPC</p>
        <h1 class="section-heading__title">Панель администратора</h1>
      </div>

      <div class="admin-tabs">
        <button type="button" class="admin-tab active" data-tab="products">
          Товары
        </button>
        <button type="button" class="admin-tab" data-tab="orders">
          Заказы
        </button>
        <button type="button" class="admin-tab" data-tab="custom">
          Заявки на ПК
        </button>
        <button type="button" class="admin-tab" data-tab="components">
          Комплектующие
        </button>
      </div>

      <div class="admin-section active" id="tab-products">
        <section class="admin-block admin-toolbar-block reveal">
          <div class="admin-toolbar">
            <div class="admin-search">
              <label for="admin-products-search" class="admin-search__label">Поиск по товарам</label>
              <input
                type="text"
                id="admin-products-search"
                class="admin-search__input"
                placeholder="Ищи по названию, категории, описанию, CPU, GPU, RAM, SSD..."
              />
            </div>

            <div class="admin-toolbar__actions">
              <button type="button" class="btn btn-gold" id="show-product-form-btn">
                Добавить товар
              </button>
              <button type="button" class="btn btn-secondary" id="sync-avito-products-btn">
                Синхронизировать цены из Авито
              </button>
            </div>
          </div>
        </section>

        <section class="admin-block admin-form-block is-hidden" id="admin-product-form-block">
          <div class="admin-block__header">
            <h2 id="admin-form-title">Добавить товар</h2>
            <button type="button" class="admin-block__close" id="hide-product-form-btn" aria-label="Скрыть форму">
              ×
            </button>
          </div>

          <form id="admin-form" class="admin-form">
            <input type="hidden" id="product-id" />

            <div class="form-group">
              <label for="name">Название</label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label for="category">Категория</label>
              <input type="text" id="category" name="category" required />
            </div>

            <div class="form-group">
              <label for="price">Цена</label>
              <input type="number" id="price" name="price" required />
            </div>

            <div class="form-group">
              <label for="oldPrice">Старая цена</label>
              <input type="number" id="oldPrice" name="oldPrice" />
            </div>

            <div class="form-group">
              <label for="cpu">CPU</label>
              <input type="text" id="cpu" name="cpu" />
            </div>

            <div class="form-group">
              <label for="gpu">GPU</label>
              <input type="text" id="gpu" name="gpu" />
            </div>

            <div class="form-group">
              <label for="ram">RAM</label>
              <input type="text" id="ram" name="ram" />
            </div>

            <div class="form-group">
              <label for="ssd">SSD</label>
              <input type="text" id="ssd" name="ssd" />
            </div>

            <div class="form-group">
              <label for="avitoItemId">Avito Item ID</label>
              <input type="text" id="avitoItemId" name="avitoItemId" placeholder="Например: 8035797917" />
            </div>

            <div class="form-group">
              <label for="avitoUrl">Ссылка на объявление Авито</label>
              <input type="text" id="avitoUrl" name="avitoUrl" placeholder="https://www.avito.ru/..." />
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
              <label for="description">Описание</label>
              <textarea id="description" name="description" rows="5" required></textarea>
            </div>

            <div class="admin-file-group" style="grid-column: 1 / -1;">
              <label for="images">Фотографии товара (до 10 шт.)</label>
              <input id="images" name="images" type="file" accept="image/*" multiple />
            </div>

            <div id="admin-images-preview" class="admin-image-preview" style="grid-column: 1 / -1;"></div>

            <label class="admin-checkbox" style="grid-column: 1 / -1;">
              <input type="checkbox" id="inStock" name="inStock" checked />
              <span>В наличии</span>
            </label>

            <div class="admin-form-actions" style="grid-column: 1 / -1;">
              <button type="submit" class="btn btn-gold">Сохранить изменения</button>
              <button type="button" class="btn btn-secondary" id="cancel-edit-btn">
                Отменить редактирование
              </button>
            </div>
          </form>
        </section>

        <section class="admin-block reveal">
          <h2>Список товаров</h2>
          <div id="admin-products-list" class="admin-list"></div>
        </section>
      </div>

      <div class="admin-section" id="tab-orders">
        <section class="admin-block reveal">
          <h2>История заказов</h2>
          <div id="admin-orders-list" class="admin-list"></div>
        </section>
      </div>

      <div class="admin-section" id="tab-custom">
        <section class="admin-block reveal">
          <h2>Заявки на индивидуальную сборку ПК</h2>
          <div id="admin-custom-pc-requests-list" class="admin-list"></div>
        </section>
      </div>

      <div class="admin-section" id="tab-components">
        <section class="admin-block admin-toolbar-block reveal">
          <div class="admin-toolbar">
            <div class="admin-search">
              <label for="admin-components-search" class="admin-search__label">Поиск по комплектующим</label>
              <input
                type="text"
                id="admin-components-search"
                class="admin-search__input"
                placeholder="Ищи по названию, типу, категории, описанию и характеристикам..."
              />
            </div>

            <div class="admin-toolbar__actions">
              <button type="button" class="btn btn-gold" id="show-component-form-btn">
                Добавить комплектующее
              </button>
            </div>
          </div>
        </section>

        <section class="admin-block admin-form-block is-hidden" id="admin-component-form-block">
          <div class="admin-block__header">
            <h2 id="component-form-title">Добавить комплектующее</h2>
            <button type="button" class="admin-block__close" id="hide-component-form-btn" aria-label="Скрыть форму">
              ×
            </button>
          </div>

          <form id="component-form" class="admin-form">
            <input type="hidden" id="component-id" />

            <div class="form-group">
              <label for="component-name">Название</label>
              <input type="text" id="component-name" required />
            </div>

            <div class="form-group">
              <label for="component-type">Тип комплектующего</label>
              <select id="component-type" required>
                <option value="">Выберите тип</option>
                <option value="cpu">Процессор</option>
                <option value="gpu">Видеокарта</option>
                <option value="motherboard">Материнская плата</option>
                <option value="ram">Оперативная память</option>
                <option value="storage">Накопитель</option>
                <option value="cooler">Охлаждение CPU</option>
                <option value="psu">Блок питания</option>
                <option value="case">Корпус</option>
                <option value="fans">Вентиляторы</option>
              </select>
            </div>

            <div class="form-group">
              <label for="component-category">Категория</label>
              <input type="text" id="component-category" placeholder="Например: Комплектующие" />
            </div>

            <div class="form-group">
              <label for="component-price">Цена</label>
              <input type="number" id="component-price" min="0" required />
            </div>

            <div class="form-group">
              <label for="component-old-price">Старая цена</label>
              <input type="number" id="component-old-price" min="0" />
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
              <label for="component-description">Описание</label>
              <textarea id="component-description" rows="5"></textarea>
            </div>

            <div class="admin-file-group" style="grid-column: 1 / -1;">
              <label for="component-images">Фотографии комплектующего (до 10 шт.)</label>
              <input id="component-images" type="file" accept="image/*" multiple />
            </div>

            <div id="component-images-preview" class="admin-image-preview" style="grid-column: 1 / -1;"></div>

            <label class="admin-checkbox" style="grid-column: 1 / -1;">
              <input type="checkbox" id="component-in-stock" checked />
              <span>В наличии</span>
            </label>

            <label class="admin-checkbox" style="grid-column: 1 / -1;">
              <input type="checkbox" id="component-is-configurator-item" checked />
              <span>Использовать в конфигураторе</span>
            </label>

            <div id="component-specs-dynamic" style="grid-column: 1 / -1;"></div>

            <div class="admin-form-actions" style="grid-column: 1 / -1;">
              <button type="submit" class="btn btn-gold">Сохранить комплектующее</button>
              <button type="button" class="btn btn-secondary" id="component-cancel-edit-btn">
                Отменить редактирование
              </button>
            </div>
          </form>
        </section>

        <section class="admin-block reveal">
          <h2>Список комплектующих</h2>
          <div id="components-list" class="admin-list"></div>
        </section>
      </div>
    </div>
  </main>

  <script src="/js/admin.js"></script>
  <script src="/js/reveal.js"></script>
</body>
</html>
