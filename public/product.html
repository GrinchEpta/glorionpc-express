<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — GlorionPC</title>
  <meta
    name="description"
    content="Страница товара GlorionPC."
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="/" class="brand">
        <div class="brand__logo-wrap">
          <img
            src="/images/logo-glorionpc.png"
            alt="Логотип GlorionPC"
            class="brand__logo"
          />
        </div>

        <div class="brand__content">
          <span class="brand__mark">GlorionPC</span>
          <span class="brand__text">Premium PC Store</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Главная</a>
        <a href="/catalog.html">Каталог</a>

        <a href="/cart.html" class="cart-link" aria-label="Корзина">
          <span class="cart-link__text">Корзина</span>
          <span class="cart-link__target" id="cart-target"></span>
        </a>

        <a href="/checkout.html">Заказы</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="product-page">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-heading__eyebrow">GlorionPC</p>
          <h1 class="section-heading__title">Карточка товара</h1>
        </div>

        <div id="product-page" class="reveal">
          <p>Загрузка товара...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="brand brand--footer">
        <div class="brand__logo-wrap brand__logo-wrap--small">
          <img
            src="/images/logo-glorionpc.png"
            alt="Логотип GlorionPC"
            class="brand__logo"
          />
        </div>

        <div class="brand__content">
          <span class="brand__mark">GlorionPC</span>
          <span class="brand__text">Premium PC Store</span>
        </div>
      </div>

      <div class="footer__nav">
        <a href="/">Главная</a>
        <a href="/catalog.html">Каталог</a>
        <a href="/cart.html">Корзина</a>
      </div>
    </div>
  </footer>

  <div class="image-modal" id="imageModal">
    <button class="image-modal__close" id="imageModalClose">&times;</button>

    <button class="image-modal__arrow image-modal__arrow--left" id="modalPrev">
      ‹
    </button>

    <img
      class="image-modal__content"
      id="modalImage"
      alt="Увеличенное изображение товара"
    />

    <button class="image-modal__arrow image-modal__arrow--right" id="modalNext">
      ›
    </button>
  </div>

  <script src="/js/cart-utils.js"></script>
  <script src="/js/product.js"></script>
  <script src="/js/reveal.js"></script>

  <div class="support-widget">
    <div class="support-widget__panel">
      <div class="support-widget__title">Поддержка</div>

      <div class="support-widget__list">
        <a href="tel:+79226976000" class="support-widget__item">
          <span class="support-widget__icon">📞</span>
          <span class="support-widget__text">
            <span class="support-widget__value">+7 922 697 60 00</span>
          </span>
        </a>

        <a href="https://vk.com/" class="support-widget__item" target="_blank" rel="noopener noreferrer">
          <span class="support-widget__icon">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12.785 16.241s.287-.031.435-.188c.135-.144.13-.414.13-.414s-.019-1.263.568-1.448c.579-.182 1.322 1.221 2.111 1.761.596.407 1.05.318 1.05.318l2.109-.03s1.103-.068.58-.936c-.043-.071-.305-.645-1.566-1.811-1.319-1.222-1.143-1.024.447-3.149.97-1.296 1.358-2.088 1.237-2.427-.115-.323-.826-.237-.826-.237l-2.373.015s-.176-.024-.306.054c-.127.076-.21.253-.21.253s-.375.999-.876 1.848c-1.057 1.793-1.48 1.888-1.652 1.777-.4-.260-.3-1.042-.3-1.599 0-1.737.264-2.462-.513-2.649-.258-.063-.448-.104-1.108-.11-.847-.009-1.563.003-1.97.203-.27.132-.477.425-.35.442.157.021.514.097.702.352.243.33.235 1.07.235 1.07s.139 2.045-.324 2.298c-.318.173-.754-.18-1.69-1.808-.48-.835-.84-1.76-.84-1.76s-.07-.17-.197-.262c-.155-.112-.372-.148-.372-.148l-2.254.015s-.338.01-.461.158c-.11.131-.009.403-.009.403s1.763 4.126 3.761 6.205c1.833 1.903 3.912 1.779 3.912 1.779h.945z"/>
            </svg>
          </span>
          <span class="support-widget__text">
            <span class="support-widget__value">ВКонтакте</span>
          </span>
        </a>

        <a href="https://www.avito.ru/" class="support-widget__item" target="_blank" rel="noopener noreferrer">
          <span class="support-widget__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="7" cy="12" r="3" fill="#97CF26"/>
              <circle cx="12" cy="7" r="3" fill="#FF4053"/>
              <circle cx="17" cy="12" r="3" fill="#009CF0"/>
              <circle cx="12" cy="17" r="3" fill="#A169F7"/>
            </svg>
          </span>
          <span class="support-widget__text">
            <span class="support-widget__value">Авито</span>
          </span>
        </a>
      </div>
    </div>

    <button
      type="button"
      class="support-widget__button"
      aria-label="Открыть поддержку">
    </button>
  </div>
</body>
</html>
